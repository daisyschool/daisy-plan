<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daisy Curriculum — Team Access</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F6E56;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.25)}
.logo{font-size:22px;font-weight:800;color:#0F6E56;letter-spacing:-0.5px;margin-bottom:4px}
.logo span{color:#E8A800}
.subtitle{font-size:13px;color:#6b7280;margin-bottom:28px}
.lock{font-size:40px;margin-bottom:20px}
label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#6b7280;margin-bottom:8px;text-align:left}
input{width:100%;padding:14px 16px;font-size:16px;border:2px solid #e5e7eb;border-radius:12px;outline:none;transition:border-color 0.2s;font-family:inherit}
input:focus{border-color:#1D9E75}
button{margin-top:14px;width:100%;padding:14px;background:#1D9E75;color:#fff;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:background 0.15s}
button:active{background:#0F6E56}
.error{margin-top:12px;font-size:13px;color:#dc2626;background:#fee2e2;padding:8px 12px;border-radius:8px;display:none}
.error.show{display:block}
.hint{margin-top:16px;font-size:11px;color:#9ca3af}
</style>
</head>
<body>
<div class="card">
  <div class="lock">🔒</div>
  <div class="logo">Daisy <span>Curriculum</span></div>
  <div class="subtitle">Team access only</div>
  <label for="pw">Password</label>
  <input type="password" id="pw" placeholder="Enter team password" autocomplete="current-password">
  <button onclick="unlock()">Access Dashboard</button>
  <div class="error" id="err">Incorrect password. Please try again.</div>
  <div class="hint">Ask Khunkru If for the team password.</div>
</div>

function b64ToBuffer(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf;
}

async function unlock() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;
  document.querySelector('button').textContent = 'Unlocking…';

  try {
    const salt = b64ToBuffer(PAYLOAD.salt);
    const iv = b64ToBuffer(PAYLOAD.iv);
    const ct = b64ToBuffer(PAYLOAD.ct);

    const keyMat = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt, iterations:100000, hash:'SHA-256'},
      keyMat, {name:'AES-CBC', length:256}, false, ['decrypt']
    );
    const dec = await crypto.subtle.decrypt({name:'AES-CBC', iv}, key, ct);
    const html = new TextDecoder().decode(dec);

    // Cache password hint so teachers don't retype every session
    try { sessionStorage.setItem('dcp', pw); } catch(e) {}

    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    document.getElementById('err').classList.add('show');
    document.querySelector('button').textContent = 'Access Dashboard';
  }
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});

// Auto-unlock if session cached
try {
  const cached = sessionStorage.getItem('dcp');
  if (cached) { document.getElementById('pw').value = cached; unlock(); }
} catch(e) {}
</script>
